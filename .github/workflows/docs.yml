name: Docs

# Build the MkDocs site and deploy to GitHub Pages. Deployment uses the GitHub
# Pages OIDC flow (id-token: write) rather than pushing to a gh-pages branch.
# Enable once under repository Settings -> Pages -> Build and deployment ->
# Source: GitHub Actions.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Cancel superseded runs, but let an in-progress deployment finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      # mkdocstrings renders this package's half of the split fortune_telling_core
      # namespace statically from `src` (see mkdocs.yml). The package is installed
      # WITHOUT its fortune-telling-core dependency on purpose: an installed core
      # package owns `fortune_telling_core/__init__.py` and would shadow this
      # package's namespace contributions on sys.path, hiding them from griffe.
      - name: Install
        run: |
          python -m pip install "mkdocs>=1.6.1" "mkdocs-material>=9.7" "mkdocstrings[python]>=1.0"
          python -m pip install --no-deps -e .

      - name: Build (strict)
        run: mkdocs build --strict

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy to Pages
    needs: build
    # Only publish from the default branch, not from manual runs on other refs.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write # publish to GitHub Pages
      id-token: write # OIDC verification of the deployment origin
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
