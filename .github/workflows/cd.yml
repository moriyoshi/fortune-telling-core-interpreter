name: CD

# Publish to PyPI on a published GitHub Release using PyPI Trusted Publishing
# (OIDC). No long-lived API token is stored: the publish job exchanges a
# short-lived GitHub OIDC token for a PyPI upload credential. Configure the
# trusted publisher once at https://pypi.org/manage/account/publishing/ with:
#   owner: moriyoshi   repository: fortune-telling-core-interpreter
#   workflow: cd.yml   environment: pypi
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Tags are required for hatch-vcs to derive the release version.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: python -m pip install --upgrade ".[release]"

      - name: Build sdist + wheel
        run: python -m build

      - name: Check distributions
        run: |
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fortune-telling-core-interpreter
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
