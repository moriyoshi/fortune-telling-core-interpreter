site_name: fortune-telling-core-interpreter
site_description: Interpretation contracts, locale resolution, and reference datasets for fortune-telling-core readings.
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          # griffe renders this package's half of the split fortune_telling_core
          # namespace statically from `src`. Build docs in an environment where
          # fortune-telling-core is NOT installed: its real package __init__ would
          # shadow these namespace contributions on sys.path and hide them.
          paths: [src]
          options:
            docstring_style: google
            members_order: source
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_if_no_docstring: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - API Reference:
      - Interpretation: api/interpretation.md
      - Registry: api/registry.md
      - Locale: api/locale.md
      - Translation bundles: api/bundles.md
      - Symbol interpretation: api/symbol_interpretation.md
      - Datasets:
          - Astrology: api/datasets/astrology.md
          - Tarot: api/datasets/tarot.md
          - Four Pillars: api/datasets/four_pillars.md
          - Nine Star Ki: api/datasets/nine_star_ki.md
          - I Ching: api/datasets/iching.md
          - Lenormand: api/datasets/lenormand.md
          - Runes: api/datasets/runes.md
          - Dominoes: api/datasets/dominoes.md
          - Geomancy: api/datasets/geomancy.md
          - "Tzolk'in": api/datasets/tzolkin.md
          - "Haab'": api/datasets/haab.md
          - Can Chi: api/datasets/can_chi.md
          - Celtic tree: api/datasets/celtic_tree.md
          - Thaksa: api/datasets/thaksa.md
          - Weton: api/datasets/weton.md
          - Koyomi: api/datasets/koyomi.md
          - Sanmeigaku: api/datasets/sanmeigaku.md
          - Sukuyō: api/datasets/sukuyo.md
          - Zi Wei Dou Shu: api/datasets/zi_wei.md
          - CJK name strokes: api/datasets/cjk_name_strokes.md
          - Numerology: api/datasets/numerology.md
          - Chaldean numerology: api/datasets/chaldean_numerology.md
          - Name numerology: api/datasets/name_numerology.md
          - Cyrillic Pythagorean: api/datasets/cyrillic_pythagorean.md
          - Cyrillic Slavonic numerals: api/datasets/cyrillic_slavonic_numerals.md
          - Greek isopsephy: api/datasets/greek_isopsephy.md
